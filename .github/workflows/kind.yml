name: KinD tests

on:
  push:
    branches:
      - main
      - release-[0-9]+.[0-9]+
  pull_request:
    branches:
      - main
      - release-[0-9]+.[0-9]+

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
    - name: Checkout Governance Policy Propagator
      uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Verify modules
      run: |
        go mod verify

    - name: Verify format
      run: |
        make fmt
        git diff --exit-code
        make lint

    - name: Verify deploy/operator.yaml
      run: |
        make generate
        make generate-operator-yaml
        git diff --exit-code

    - name: Unit Test Coverage
      run: |
        make test-coverage
    
    - name: Upload Unit Test Coverage
      uses: actions/upload-artifact@v7
      with:
        name: latest-coverage_unit
        path: |
          coverage_unit.out
          report_unit.xml

  kind-tests:
    runs-on: ubuntu-latest
    env:
      REGISTRY: localhost:5000
    strategy:
      fail-fast: false
      matrix:
        # Run tests on minimum and newest supported OCP Kubernetes
        # The "minimum" tag is set in the Makefile
        # KinD tags: https://hub.docker.com/r/kindest/node/tags
        kind:
          - 'minimum'
          - 'latest'
    name: KinD tests
    steps:
    - name: Checkout Governance Policy Propagator
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Create K8s KinD Cluster - ${{ matrix.kind }}
      env:
        KIND_VERSION: ${{ matrix.kind }}
      run: |
        make kind-bootstrap-cluster-dev
    
    - name: Ensure Service Account kubeconfig
      run: |
        KUBECONFIG=${PWD}/kubeconfig_hub make kind-ensure-sa

    - name: E2E Tests
      run: |
        export GOPATH=$(go env GOPATH)
        KUBECONFIG=${PWD}/kubeconfig_hub make e2e-test-coverage

    - name: Tests without PlacementRule
      run: |
        KUBECONFIG=${PWD}/kubeconfig_hub_e2e kubectl delete crd placementrules.apps.open-cluster-management.io
        KUBECONFIG=${PWD}/kubeconfig_hub make e2e-test-coverage-non-placement-rule

    - name: Verify Deployment Configuration
      run: |
        make webhook
        make build-images
        KUBECONFIG=${PWD}/kubeconfig_hub_e2e make kind-deploy-controller-dev
    
    - name: E2E Tests for Webhook
      run: |
        KUBECONFIG=${PWD}/kubeconfig_hub make e2e-test-webhook

    - name: Upload Test Info
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: "${{matrix.kind}}-kind-tests"
        path: |
          coverage_*.out
          report_*.xml

    - name: Debug
      if: ${{ failure() }}
      run: |
        make e2e-debug

    - name: Clean up cluster
      if: ${{ always() }}
      run: |
        make kind-delete-cluster

  policyautomation-tests:
    runs-on: ubuntu-latest
    env:
      REGISTRY: localhost:5000
    strategy:
      fail-fast: false
      matrix:
        # Run tests on minimum and newest supported OCP Kubernetes
        # The "minimum" tag is set in the Makefile
        # KinD tags: https://hub.docker.com/r/kindest/node/tags
        kind:
          - 'minimum'
          - 'latest'
    name: PolicyAutomation tests
    steps:
    - name: Checkout Governance Policy Propagator
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      id: go
      with:
        go-version-file: go.mod

    - name: Create K8s KinD Cluster - ${{ matrix.kind }}
      env:
        KIND_VERSION: ${{ matrix.kind }}
      run: |
        make kind-bootstrap-cluster-dev

    - name: PolicyAutomation E2E Tests
      run: |
        export GOPATH=$(go env GOPATH)
        KUBECONFIG=${PWD}/kubeconfig_hub make e2e-test-coverage-policyautomation

    - name: Upload Test Info
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: "${{matrix.kind}}-policyautomation-tests"
        path: |
          coverage_*.out
          report_*.xml

    - name: Debug
      if: ${{ failure() }}
      run: |
        make e2e-debug

    - name: Clean up cluster
      if: ${{ always() }}
      run: |
        make kind-delete-cluster

  coverage-verification:
    defaults:
      run:
        working-directory: '.'
    runs-on: ubuntu-latest
    name: Test Coverage Verification
    needs: [unit-tests, kind-tests, policyautomation-tests]

    steps:
    - name: Checkout Governance Policy Propagator
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Download Test Results
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true
        pattern: latest-*
    
    - name: Test Coverage Verification
      run: |
        make coverage-verify
        make gosec-scan

    - name: Report unit coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        files: ./coverage_unit.out
        flags: unit-tests
        name: unit-tests
        fail_ci_if_error: false
        disable_search: true

    - name: Report e2e coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        files: ./coverage_e2e.out
        flags: e2e-tests
        name: e2e-tests
        fail_ci_if_error: false
        disable_search: true

    - name: Report overall coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        fail_ci_if_error: false
