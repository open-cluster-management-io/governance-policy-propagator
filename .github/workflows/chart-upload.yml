name: Helm Chart Upload

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  upload:
    name: Helm Chart Upload
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: release_version
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/tags/}
          echo "SEMANTIC_RELEASE_VERSION=${RELEASE_VERSION#v}" | tee -a ${GITHUB_ENV}
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" | tee -a ${GITHUB_ENV}

      - name: Upload Helm chart to OCM chart repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OCM_BOT_PAT }}
          script: |
            try {
              const result = await github.rest.actions.createWorkflowDispatch({
                owner:          'open-cluster-management-io',
                repo:           'helm-charts',
                workflow_id:    'download-chart.yml',
                ref: 'main',
                inputs: {
                  repo:         process.env.GITHUB_REPOSITORY,
                  version:      process.env.SEMANTIC_RELEASE_VERSION,
                  "chart-name": process.env.REPO_NAME,
                },
              })
              console.log(result);
            } catch(error) {
              console.error(error);
              core.setFailed(error);
            }
