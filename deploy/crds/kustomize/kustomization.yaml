resources:
- policy.open-cluster-management.io_policies.yaml
- policy.open-cluster-management.io_placementbindings.yaml

# Add validation more complicated than Kubebuilder markers can provide
patches:
- path: ns-validation.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: policies.policy.open-cluster-management.io
- path: placement-validation.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: placementbindings.policy.open-cluster-management.io
