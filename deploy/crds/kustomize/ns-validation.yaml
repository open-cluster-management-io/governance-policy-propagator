- op: add
  path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/dependencies/items/oneOf
  value:
    - properties:
        kind:
          enum:
            - CertificatePolicy
            - ConfigurationPolicy
        namespace:
          maxLength: 0
    - not:
        properties:
          kind:
            pattern: ^(?:(?:Certificate|Configuration)Policy)$
- op: replace
  path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/dependencies/items/required
  value:
    - apiVersion
    - kind
    - name
    - compliance
- op: add
  path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/policy-templates/items/properties/extraDependencies/items/oneOf
  value:
    - properties:
        kind:
          enum:
            - CertificatePolicy
            - ConfigurationPolicy
        namespace:
          maxLength: 0
    - not:
        properties:
          kind:
            pattern: ^(?:(?:Certificate|Configuration)Policy)$
- op: replace
  path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/policy-templates/items/properties/extraDependencies/items/required
  value:
    - apiVersion
    - kind
    - name
    - compliance
