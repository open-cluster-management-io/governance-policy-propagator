---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: governance-policy-propagator
    webhook-origin: governance-policy-propagator
  name: governance-policy-propagator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: governance-policy-propagator
      webhook-origin: governance-policy-propagator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: governance-policy-propagator
      labels:
        name: governance-policy-propagator
        webhook-origin: governance-policy-propagator
    spec:
      containers:
        - name: governance-policy-propagator
          image: quay.io/open-cluster-management/governance-policy-propagator:latest
          command:
            - governance-policy-propagator
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8383
            - --leader-elect
          ports:
            - containerPort: 8383
              protocol: TCP
              name: http
            - containerPort: 9443
              protocol: TCP
              name: webhook-http
          imagePullPolicy: Always
          volumeMounts:
          - mountPath: /tmp/hub-templates
            name: hub-templates
          - mountPath: /tmp/k8s-webhook-server/serving-certs
            name: cert
            readOnly: true
          env:
            - name: WATCH_NAMESPACE
              value: ""
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: governance-policy-propagator
      volumes:
      - emptyDir: {}
        name: hub-templates
      - name: cert
        secret:
          defaultMode: 420
          secretName: propagator-webhook-server-cert
